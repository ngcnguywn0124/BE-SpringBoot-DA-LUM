spring.application.name=be-springboot-lum
server.port=${PORT:8686}

# Public-safe config only.
# Secrets for production must come from Render environment variables.

# PostgreSQL (default port 5432)
# On Render, set SPRING_DATASOURCE_URL/USERNAME/PASSWORD from dashboard.
spring.datasource.url=${SPRING_DATASOURCE_URL:${DATABASE_URL:jdbc:postgresql://localhost:5433/lum_trace_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.sslmode=${SPRING_DATASOURCE_SSLMODE:require}
spring.datasource.hikari.connection-timeout=${SPRING_DATASOURCE_CONNECTION_TIMEOUT:30000}
spring.datasource.hikari.maximum-pool-size=${SPRING_DATASOURCE_MAX_POOL_SIZE:10}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API prefix
api.prefix=${API_PREFIX:/api/v1}

# JWT
# Fallback below is for local development only. Set JWT_SECRET on Render.
jwt.secret=${JWT_SECRET:ZGV2LXNwcmluZ2Jvb3QtbHVtLXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LTEyMzQ1Njc4OTA=}
jwt.access-token-expiration=${JWT_ACCESS_TOKEN_EXPIRATION:900000}
jwt.refresh-token-expiration=${JWT_REFRESH_TOKEN_EXPIRATION:1209600000}

# Mail (Gmail SMTP - update credentials)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}

# Frontend URL (for password reset link)
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# Cookie: false khi dev (HTTP), true khi production (HTTPS)
app.cookie.secure=${APP_COOKIE_SECURE:false}

# Google OAuth2
google.oauth2.client-id=${GOOGLE_OAUTH2_CLIENT_ID:}
google.oauth2.client-secret=${GOOGLE_OAUTH2_CLIENT_SECRET:}
google.oauth2.callback-url=${GOOGLE_OAUTH2_CALLBACK_URL:http://localhost:8686/api/v1/auth/google/callback}
# google.oauth2.callback-url=https://josie-juxtapositional-rebbecca.ngrok-free.dev/api/v1/auth/google/callback
google.oauth2.authorization-uri=${GOOGLE_OAUTH2_AUTHORIZATION_URI:https://accounts.google.com/o/oauth2/v2/auth}
google.oauth2.token-uri=${GOOGLE_OAUTH2_TOKEN_URI:https://oauth2.googleapis.com/token}
google.oauth2.userinfo-uri=${GOOGLE_OAUTH2_USERINFO_URI:https://www.googleapis.com/oauth2/v3/userinfo}

# Async
spring.task.execution.pool.core-size=${SPRING_TASK_EXECUTION_POOL_CORE_SIZE:5}
spring.task.execution.pool.max-size=${SPRING_TASK_EXECUTION_POOL_MAX_SIZE:20}
spring.task.execution.pool.queue-capacity=${SPRING_TASK_EXECUTION_POOL_QUEUE_CAPACITY:100}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
cloudinary.upload-folder=${CLOUDINARY_UPLOAD_FOLDER:lum}

# Multipart file upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:10MB}
