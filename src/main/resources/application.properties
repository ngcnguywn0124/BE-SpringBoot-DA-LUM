spring.application.name=be-springboot-lum
server.port=8686

# PostgreSQL (default port 5432)
spring.datasource.url=jdbc:postgresql://localhost:5433/lum_trace_db
spring.datasource.username=postgres
spring.datasource.password=demo1234
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# API prefix
api.prefix=/api/v1

# JWT
jwt.secret=edafc99abc17f95b1e45bd286f8b9da15854996bc993d3f826dff842f2dfb9c4ce9027b3e3b9b0eb4a227382617a7128ee0b176b7e9d71aadc627ad65f73f522
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=1209600000

# Mail (Gmail SMTP - update credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your-email@gmail.com
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL (for password reset link)
app.frontend-url=http://localhost:3000

# Async
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=20
spring.task.execution.pool.queue-capacity=100